name: workout_lock
description: Productivity app that locks selected apps until daily workout is completed with AI pose verification.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0+2
  google_mlkit_pose_detection: ^0.12.0
  google_mlkit_face_detection: ^0.11.0
  sqflite: ^2.3.3+2
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  flutter_tts: ^4.2.0
  provider: ^6.1.2
  intl: ^0.19.0
  fl_chart: ^0.69.0
  uuid: ^4.5.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
